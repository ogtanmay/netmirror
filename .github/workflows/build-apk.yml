name: Build Android APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # ── Flutter ──────────────────────────────────────────────────────────
      - name: Set up Flutter 3.32.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Verify Flutter installation
        run: flutter --version

      # ── Android SDK extras ───────────────────────────────────────────────
      - name: Install NDK 27.0.12077973
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "build-tools;35.0.0" \
            "platforms;android-35" \
            "platforms;android-34" \
            --sdk_root=$ANDROID_HOME

      - name: Accept Android licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --licenses --sdk_root=$ANDROID_HOME || true

      # ── Dependencies ─────────────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── Keystore (release only) ───────────────────────────────────────────
      # To enable release signing:
      # 1. Generate a keystore:
      #      keytool -genkey -v -keystore release.jks -alias upload \
      #        -keyalg RSA -keysize 2048 -validity 10000
      # 2. Base64-encode it:
      #      base64 -i release.jks | pbcopy
      # 3. Add these GitHub repository secrets:
      #      KEYSTORE_BASE64   — base64-encoded keystore file
      #      KEYSTORE_PASSWORD — keystore password
      #      KEY_ALIAS         — key alias (e.g. "upload")
      #      KEY_PASSWORD      — key password
      - name: Decode keystore
        if: |
          (github.event_name != 'workflow_dispatch' || inputs.build_type == 'release')
          && secrets.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore/release.jks

      - name: Create key.properties
        if: |
          (github.event_name != 'workflow_dispatch' || inputs.build_type == 'release')
          && secrets.KEYSTORE_BASE64 != ''
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore/release.jks
          EOF

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build release APK
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'release'
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-symbols/release
        env:
          JAVA_TOOL_OPTIONS: "-XX:-UsePerfData"

      - name: Build debug APK
        if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug'
        run: flutter build apk --debug
        env:
          JAVA_TOOL_OPTIONS: "-XX:-UsePerfData"

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload release APKs
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: netmirror-release-apks
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload debug APK
        if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: netmirror-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # ── Release (tag pushes only) ─────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
