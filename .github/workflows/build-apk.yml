name: Build Android APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    # Allow writing back secrets
    permissions:
      contents: write
      actions: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # ── Flutter ──────────────────────────────────────────────────────────
      - name: Set up Flutter 3.32.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Verify Flutter installation
        run: flutter --version

      # ── Android SDK extras ───────────────────────────────────────────────
      - name: Install NDK and SDK components
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "build-tools;35.0.0" \
            "platforms;android-35" \
            "platforms;android-34" \
            --sdk_root=$ANDROID_HOME
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --licenses --sdk_root=$ANDROID_HOME || true

      # ── Dependencies ─────────────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── Keystore — auto-generate on first run ─────────────────────────────
      # On first run KEYSTORE_BASE64 is empty → we generate a keystore,
      # save all four values back to GitHub Actions secrets via the PAT,
      # and use the freshly generated keystore for signing right away.
      # On every subsequent run the saved secrets are used directly.
      - name: Generate keystore (first run only)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -e

          # ── Random strong credentials ──────────────────────────────────
          KEYSTORE_PASS=$(openssl rand -base64 32 | tr -dc 'A-Za-z0-9' | head -c 28)
          KEY_PASS=$(openssl rand -base64 32 | tr -dc 'A-Za-z0-9' | head -c 28)
          KEY_ALIAS="upload"

          echo "KEYSTORE_PASS=$KEYSTORE_PASS" >> $GITHUB_ENV
          echo "KEY_PASS=$KEY_PASS"           >> $GITHUB_ENV
          echo "KEY_ALIAS=$KEY_ALIAS"         >> $GITHUB_ENV

          # ── Generate JKS keystore ──────────────────────────────────────
          keytool -genkey -v \
            -keystore release.jks \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 4096 \
            -validity 36500 \
            -storepass "$KEYSTORE_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=Netmirror, OU=Android, O=Netmirror, L=Unknown, ST=Unknown, C=IN"

          # ── Encode and save to GitHub Secrets ─────────────────────────
          KEYSTORE_B64=$(base64 -w 0 release.jks)

          REPO="${{ github.repository }}"
          gh secret set KEYSTORE_BASE64  --body "$KEYSTORE_B64"    --repo "$REPO"
          gh secret set KEYSTORE_PASSWORD --body "$KEYSTORE_PASS"  --repo "$REPO"
          gh secret set KEY_ALIAS         --body "$KEY_ALIAS"       --repo "$REPO"
          gh secret set KEY_PASSWORD      --body "$KEY_PASS"        --repo "$REPO"

          echo "✅ Keystore generated and saved to GitHub Secrets"

          # ── Write keystore to disk for this run ────────────────────────
          mkdir -p android/app/keystore
          cp release.jks android/app/keystore/release.jks

      # Restore keystore from secrets on subsequent runs
      - name: Restore keystore from secrets
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/keystore/release.jks

          echo "KEYSTORE_PASS=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_PASS=${{ secrets.KEY_PASSWORD }}"           >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"             >> $GITHUB_ENV

      # ── Write key.properties ─────────────────────────────────────────────
      - name: Write key.properties
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'release'
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ env.KEYSTORE_PASS }}
          keyPassword=${{ env.KEY_PASS }}
          keyAlias=${{ env.KEY_ALIAS }}
          storeFile=keystore/release.jks
          EOF

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build release APK (split per ABI)
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'release'
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-symbols/release
        env:
          JAVA_TOOL_OPTIONS: "-XX:-UsePerfData"

      - name: Build debug APK
        if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug'
        run: flutter build apk --debug
        env:
          JAVA_TOOL_OPTIONS: "-XX:-UsePerfData"

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload release APKs
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: netmirror-release-apks
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload debug APK
        if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: netmirror-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # ── GitHub Release on version tags ────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
