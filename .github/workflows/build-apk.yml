name: Build Android APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # ── Flutter ──────────────────────────────────────────────────────────
      - name: Set up Flutter 3.32.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      # ── Android SDK ───────────────────────────────────────────────────────
      - name: Install NDK and SDK components
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "build-tools;35.0.0" \
            "platforms;android-35" \
            "platforms;android-34" \
            --sdk_root=$ANDROID_HOME
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --licenses --sdk_root=$ANDROID_HOME || true

      # ── Dependencies ─────────────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── Detect whether keystore secret exists ─────────────────────────────
      # secrets context is forbidden in if: — write a flag to GITHUB_ENV instead
      - name: Check keystore secret
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "KEYSTORE_EXISTS=false" >> "$GITHUB_ENV"
          else
            echo "KEYSTORE_EXISTS=true"  >> "$GITHUB_ENV"
          fi

      # ── Generate keystore on first run ────────────────────────────────────
      # Creates a 4096-bit RSA key, saves all four values to GitHub Secrets
      # via PAT_TOKEN, then makes the keystore available for signing this run.
      - name: Generate keystore (first run only)
        if: env.KEYSTORE_EXISTS == 'false'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          KS_PASS=$(openssl rand -base64 32 | tr -dc 'A-Za-z0-9' | head -c 28)
          KEY_PASS=$(openssl rand -base64 32 | tr -dc 'A-Za-z0-9' | head -c 28)
          KEY_ALIAS="upload"

          # Generate JKS keystore explicitly (avoids PKCS12/JKS ambiguity)
          keytool -genkey -v \
            -keystore release.jks \
            -storetype JKS \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 4096 \
            -validity 36500 \
            -storepass "$KS_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=Netmirror,OU=Android,O=Netmirror,L=Unknown,ST=Unknown,C=IN"

          # Verify it's readable before saving
          keytool -list -keystore release.jks -storepass "$KS_PASS" -storetype JKS

          # Base64-encode (no line wraps) and push to GitHub Secrets
          KS_B64=$(base64 -w 0 release.jks)
          REPO="${{ github.repository }}"
          gh secret set KEYSTORE_BASE64   --body "$KS_B64"    --repo "$REPO"
          gh secret set KEYSTORE_PASSWORD --body "$KS_PASS"   --repo "$REPO"
          gh secret set KEY_ALIAS         --body "$KEY_ALIAS"  --repo "$REPO"
          gh secret set KEY_PASSWORD      --body "$KEY_PASS"   --repo "$REPO"

          echo "✅ Keystore generated and saved to GitHub Secrets"

          # Make available to later steps in this run
          mkdir -p android/app/keystore
          cp release.jks android/app/keystore/release.jks
          printf 'KEYSTORE_PASS=%s\nKEY_PASS=%s\nKEY_ALIAS=%s\n' \
            "$KS_PASS" "$KEY_PASS" "$KEY_ALIAS" >> "$GITHUB_ENV"

      # ── Restore keystore from secrets (subsequent runs) ───────────────────
      # IMPORTANT: always pass secrets through env: — never expand them
      # inline in shell (${{ secrets.X }} in run: can mangle binary base64).
      - name: Restore keystore from secrets
        if: env.KEYSTORE_EXISTS == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS:      ${{ secrets.KEYSTORE_PASSWORD }}
          KA:           ${{ secrets.KEY_ALIAS }}
          KP:           ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p android/app/keystore
          # printf avoids the trailing newline that echo adds
          printf '%s' "$KEYSTORE_B64" | base64 --decode \
            > android/app/keystore/release.jks

          # Verify the decoded keystore is intact before proceeding
          keytool -list \
            -keystore android/app/keystore/release.jks \
            -storepass "$KS_PASS" \
            -storetype JKS

          printf 'KEYSTORE_PASS=%s\nKEY_PASS=%s\nKEY_ALIAS=%s\n' \
            "$KS_PASS" "$KP" "$KA" >> "$GITHUB_ENV"

      # ── Write key.properties ─────────────────────────────────────────────
      - name: Write key.properties
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'release'
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            "$KEYSTORE_PASS" \
            "$KEY_PASS" \
            "$KEY_ALIAS" \
            "keystore/release.jks" \
            > android/key.properties

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build release APK (split per ABI)
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'release'
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-symbols/release
        env:
          JAVA_TOOL_OPTIONS: "-XX:-UsePerfData"

      - name: Build debug APK
        if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug'
        run: flutter build apk --debug
        env:
          JAVA_TOOL_OPTIONS: "-XX:-UsePerfData"

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload release APKs
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: netmirror-release-apks
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload debug APK
        if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: netmirror-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # ── GitHub Release on version tags ────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
